services:
  knesset-reader:
    build: .
    container_name: knesset-protocol-reader
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      TRUST_PROXY: "1"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      AUTH_BASIC_USERNAME: ${AUTH_BASIC_USERNAME:-}
      AUTH_BASIC_PASSWORD: ${AUTH_BASIC_PASSWORD:-}
      AUTH_BASIC_DISPLAY_NAME: ${AUTH_BASIC_DISPLAY_NAME:-}
      AUTH_ADVANCED_USERNAME: ${AUTH_ADVANCED_USERNAME:-}
      AUTH_ADVANCED_PASSWORD: ${AUTH_ADVANCED_PASSWORD:-}
      AUTH_ADVANCED_DISPLAY_NAME: ${AUTH_ADVANCED_DISPLAY_NAME:-}
      AUTH_ADMIN_USERNAME: ${AUTH_ADMIN_USERNAME:-}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:-}
      AUTH_ADMIN_DISPLAY_NAME: ${AUTH_ADMIN_DISPLAY_NAME:-}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-auto}
      PGHOST: ${PGHOST_DOCKER:-host.docker.internal}
      PGPORT: ${PGPORT:-5432}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-sa}
      PGDATABASE: ${PGDATABASE:-knesset}
    expose:
      - "3001"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3001/api/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2
    container_name: knesset-protocol-reader-caddy
    restart: unless-stopped
    depends_on:
      knesset-reader:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
